<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d78c"/>
      <stop offset="40%" style="stop-color:#d4a853"/>
      <stop offset="100%" style="stop-color:#9a7b2d"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="50%" style="stop-color:#f5e6b8"/>
      <stop offset="100%" style="stop-color:#d4a853"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111118"/>
      <stop offset="100%" style="stop-color:#08080c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Gold border accent -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- Diamond shape behind text -->
  <path d="M16 4 L24 14 L16 28 L8 14 Z" fill="url(#gold)" opacity="0.12"/>
  <path d="M16 4 L24 14 L16 28 L8 14 Z" fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.3"/>
  <!-- Facet lines -->
  <line x1="8" y1="14" x2="24" y2="14" stroke="url(#gold)" stroke-width="0.4" opacity="0.25"/>
  <line x1="16" y1="4" x2="12" y2="14" stroke="url(#gold)" stroke-width="0.3" opacity="0.2"/>
  <line x1="16" y1="4" x2="20" y2="14" stroke="url(#gold)" stroke-width="0.3" opacity="0.2"/>
  <!-- 24K text -->
  <text x="16" y="15.5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="9" fill="url(#goldShine)" letter-spacing="0.5">24K</text>
  <!-- Sparkle dot -->
  <circle cx="23" cy="7" r="1.2" fill="#f5e6b8" opacity="0.8"/>
  <circle cx="23" cy="7" r="0.5" fill="#fff" opacity="0.9"/>
</svg>
